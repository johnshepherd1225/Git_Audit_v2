<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Epos Audit">
<title>Epos Audit</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4fa;color:#222;min-height:100vh}
/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:#0d2b55;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.app-header h1{font-size:1.25rem;font-weight:700;letter-spacing:.5px}
.header-actions{display:flex;gap:10px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;min-height:44px;transition:all .15s}
.btn-primary{background:#1a6fba;color:#fff}
.btn-primary:hover{background:#155fa0}
.btn-outline{background:#fff;color:#1a6fba;border:2px solid #1a6fba}
.btn-outline:hover{background:#e8f0fb}
.btn-danger{background:#e53935;color:#fff}
.btn-danger:hover{background:#c62828}
.btn-ghost{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.6)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:6px 12px;font-size:.8rem;min-height:36px}
.btn-xs{padding:4px 8px;font-size:.75rem;min-height:30px}
/* LAYOUT */
.main-content{max-width:1200px;margin:0 auto;padding:16px}
/* CARDS */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:16px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:#f5f8ff;border-bottom:1px solid #ccdaf5;cursor:pointer;user-select:none}
.card-header:hover{background:#f0f5ff}
.card-title{font-size:1rem;font-weight:700;flex:1}
.card-body{padding:18px}
.collapse-icon{font-size:1.1rem;transition:transform .2s;color:#1a6fba}
.collapsed .collapse-icon{transform:rotate(-90deg)}
/* GRID */
.form-grid{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.full-width{grid-column:1/-1}
/* FORM FIELDS */
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.8rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px}
.form-control{padding:10px 12px;border:1.5px solid #ccc;border-radius:8px;font-size:.95rem;min-height:44px;transition:border-color .15s;background:#fff}
.form-control:focus{outline:none;border-color:#1a6fba;box-shadow:0 0 0 3px rgba(76,175,80,.15)}
textarea.form-control{min-height:80px;resize:vertical}
/* BUTTON GROUPS */
.btn-group-label{font-size:.8rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.btn-group{display:flex;flex-wrap:wrap;gap:6px}
.btn-group .bg-btn{min-height:44px;min-width:60px;padding:8px 14px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:2px solid #1a6fba;background:#fff;color:#1a6fba;transition:all .15s;white-space:nowrap}
.btn-group .bg-btn:hover{background:#e8f0fb}
.btn-group .bg-btn.selected{background:#1a6fba;color:#fff}
/* SECTIONS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:1.1rem;font-weight:700;color:#0d2b55}
/* AREA CARD */
.area-card{border:2px solid #b8d0f0;border-radius:12px;margin-bottom:16px;overflow:hidden}
.area-header{background:#e8f0fb;padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.area-title{font-size:1rem;font-weight:700;flex:1;color:#0d2b55;cursor:pointer}
.area-body{padding:16px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;text-transform:uppercase}
.badge-interior{background:#bbdefb;color:#1565c0}
.badge-exterior{background:#fff9c4;color:#f57f17}
/* ROOM CARD */
.room-card{border:1px solid #ddd;border-radius:10px;margin-bottom:12px;overflow:hidden}
.room-header{background:#fafafa;padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.room-header:hover{background:#f0f0f0}
.room-title{font-size:.95rem;font-weight:700;flex:1}
.room-body{padding:14px}
/* FIXTURE ROW */
.fixture-list{margin-top:12px}
.fixture-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f9f9f9;border-radius:8px;margin-bottom:6px;flex-wrap:wrap}
.fixture-id{font-size:.8rem;font-weight:700;color:#888;min-width:40px}
.fixture-code{font-size:.85rem;font-weight:600;flex:1;color:#0d2b55;font-family:monospace}
.fixture-qty{font-size:.85rem;color:#555}
.fixture-action{font-size:.8rem;color:#777}
/* FIXTURE FORM */
.fixture-form-panel{background:#f0f5ff;border:1px solid #b8d0f0;border-radius:10px;padding:16px;margin-top:10px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;border-radius:14px;max-height:90vh;display:flex;flex-direction:column;width:100%;max-width:700px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box.modal-lg{max-width:900px}
.modal-box.modal-full{max-width:100%;max-height:100vh;border-radius:0;height:100vh}
.modal-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px}
.modal-title{font-size:1.1rem;font-weight:700;flex:1}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:flex-end}
/* WIZARD */
.wizard-modal{background:#fff;display:flex;flex-direction:column;height:100vh;width:100vw;max-width:100%;border-radius:0}
.wizard-breadcrumb{display:flex;gap:4px;padding:10px 16px;background:#0d2b55;overflow-x:auto;flex-shrink:0}
.wizard-crumb{display:flex;flex-direction:column;align-items:center;min-width:70px;padding:4px 8px;border-radius:6px;cursor:default;opacity:.5;transition:all .15s;flex-shrink:0}
.wizard-crumb.done{opacity:1;cursor:pointer;background:rgba(255,255,255,.15)}
.wizard-crumb.done:hover{background:rgba(255,255,255,.25)}
.wizard-crumb.active{opacity:1;background:rgba(255,255,255,.3);outline:2px solid #fff;outline-offset:-2px}
.wizard-crumb-label{font-size:.65rem;color:#90b8e8;text-transform:uppercase;letter-spacing:.3px}
.wizard-crumb-value{font-size:.75rem;color:#fff;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wizard-content{flex:1;overflow-y:auto;padding:16px}
.wizard-step-title{font-size:1.2rem;font-weight:700;color:#0d2b55;margin-bottom:16px}
.wizard-options{display:flex;flex-wrap:wrap;gap:8px}
.wizard-option{min-height:52px;min-width:80px;padding:10px 16px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:2px solid #1a6fba;background:#fff;color:#1a6fba;transition:all .15s;text-align:center}
.wizard-option:hover{background:#e8f0fb}
.wizard-option.selected{background:#1a6fba;color:#fff}
/* Tech image tiles (step 1) */
.tech-tiles{display:flex;flex-wrap:wrap;gap:12px}
.tech-tile{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;width:100px;min-height:110px;padding:10px 8px 10px;border-radius:12px;border:2px solid #b8d0f0;background:#fff;cursor:pointer;transition:all .15s;color:#0d2b55;font-size:.78rem;font-weight:600;text-align:center;line-height:1.2}
.tech-tile:hover{border-color:#1a6fba;background:#e8f0fb}
.tech-tile.selected{border-color:#1a6fba;background:#1a6fba;color:#fff}
.tech-tile.selected svg *[fill]:not([fill="none"]){fill:#fff!important}
.tech-tile.selected svg *[stroke]:not([stroke="none"]){stroke:#fff!important}
.tech-tile svg{width:56px;height:56px;flex-shrink:0}
.wizard-custom-input{display:flex;gap:8px;align-items:center;margin-top:10px}
.wizard-custom-row{margin-top:14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.wizard-custom-entry{display:flex;gap:8px;align-items:center;flex:1;min-width:200px}
.wizard-custom-entry .form-control{flex:1}
.wizard-custom-badge{font-size:.8rem;background:#e8f0fb;color:#0d2b55;padding:3px 10px;border-radius:10px;font-weight:600}
.wizard-footer{padding:12px 16px;background:#f5f8ff;border-top:1px solid #ccdaf5;display:flex;align-items:center;gap:10px;flex-shrink:0}
.wizard-code-preview{flex:1;font-family:monospace;font-size:.9rem;color:#0d2b55;font-weight:700;background:#e8f0fb;padding:8px 12px;border-radius:8px;word-break:break-all}
/* MASS UPDATE */
.mass-update-tree{max-height:300px;overflow-y:auto;border:1px solid #ddd;border-radius:8px;padding:8px}
.mu-area{margin-bottom:8px}
.mu-room{margin-left:20px;margin-bottom:4px}
.mu-fixture{margin-left:40px;font-size:.85rem;padding:2px 0}
.mu-check-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.mu-check-row label{cursor:pointer}
/* DIVIDER */
.divider{height:1px;background:#eee;margin:16px 0}
/* PHOTOS */
.photo-section{margin-top:12px;padding-top:12px;border-top:1px solid #ccdaf5}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-thumb{position:relative;width:90px;height:90px;border-radius:8px;overflow:hidden;border:2px solid #b8d0f0;cursor:pointer;flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.photo-thumb .photo-del:hover{background:rgba(200,0,0,.8)}
.photo-viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.photo-viewer-overlay.active{display:flex}
.photo-viewer-overlay img{max-width:95vw;max-height:82vh;border-radius:10px;object-fit:contain}
.photo-viewer-label{color:#fff;font-size:.9rem;opacity:.8}
/* SUMMARY GRID */
.summary-section{margin-top:32px;margin-bottom:32px}
.summary-section .section-title{font-size:1.1rem;font-weight:700;color:#0d2b55;margin-bottom:12px}
.summary-table-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.summary-table{width:100%;border-collapse:collapse;background:#fff;font-size:.88rem}
.summary-table thead tr{background:#0d2b55;color:#fff}
.summary-table thead th{padding:10px 14px;text-align:left;font-weight:600;white-space:nowrap;letter-spacing:.3px}
.summary-table tbody tr{border-bottom:1px solid #eee;transition:background .1s}
.summary-table tbody tr:last-child{border-bottom:none}
.summary-table tbody tr:hover{background:#f0f5ff}
.summary-table tbody tr:nth-child(even){background:#f5f8ff}
.summary-table tbody tr:nth-child(even):hover{background:#e8f0fb}
.summary-table td{padding:8px 14px;vertical-align:middle}
.summary-id{color:#888;font-size:.8rem;font-weight:700}
.summary-area{font-weight:600;color:#0d2b55}
.summary-room{color:#444}
.summary-fixture{font-weight:600;color:#0d4fa0}
.summary-qty{text-align:center;font-weight:700;color:#555}
.summary-action{color:#555;font-size:.82rem}
.summary-notes{color:#888;font-size:.8rem;font-style:italic;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.summary-empty{text-align:center;padding:32px;color:#aaa;font-style:italic}
.summary-area-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:700;background:#e8f0fb;color:#0d2b55;margin-left:6px}
/* UTIL */
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.text-sm{font-size:.85rem}.text-muted{color:#888}
.inline-add-form{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.no-rooms-msg{text-align:center;color:#aaa;padding:20px;font-style:italic}
/* SAVE INDICATOR */
.save-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#64a8e0;margin-left:8px;transition:background .3s;vertical-align:middle}
.save-dot.unsaved{background:#ffb74d}
/* PROJECT MANAGER */
.proj-list{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto}
.proj-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid #ccdaf5;border-radius:10px;background:#f5f8ff;cursor:pointer;transition:all .15s}
.proj-item:hover{border-color:#1a6fba;background:#e8f0fb}
.proj-item.active-proj{border-color:#0d2b55;background:#e8f0fb}
.proj-info{flex:1;min-width:0}
.proj-name{font-weight:700;font-size:1rem;color:#0d2b55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{font-size:.78rem;color:#888;margin-top:2px}
.proj-badge{font-size:.72rem;background:#0d2b55;color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap}
.current-proj-label{font-size:.8rem;color:rgba(255,255,255,.7);margin-left:8px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
@media(max-width:600px){
  .app-header h1{font-size:1rem}
  .btn{padding:8px 12px;font-size:.85rem}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>

function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2,8)}

  const body=document.getElementById(id.replace('Card','Body'));

  if(card.classList.contains('collapsed')) body.style.display='none';

function $id(id){return document.getElementById(id)}

function extractWatts(lampCode){
  if(!lampCode||['With Lamps','No Existing','TBD'].includes(lampCode)) return 0;
  let m;
  m=lampCode.match(/^LED(\d+\.?\d*)W$/i);if(m) return parseFloat(m[1]);
  m=lampCode.match(/^L(\d+)T\d+LED$/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^[A-Z]+(\d+\.?\d*)W$/i);if(m) return parseFloat(m[1]);
  m=lampCode.match(/^FC(\d+)T/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^FU(\d+)T/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^F(\d+)T/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^MHPS(\d+)/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^(?:MH|HPS|MV|QL|Q)(\d+)/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^H(\d+)/i);if(m) return parseInt(m[1]);
  m=lampCode.match(/^I(\d+\.?\d*)/i);if(m) return parseFloat(m[1]);
  m=lampCode.match(/^L(\d+\.?\d*)/i);if(m) return parseFloat(m[1]);
  m=lampCode.match(/^(\d+\.?\d*)w$/i);if(m) return parseFloat(m[1]);
  return 0;
}

function calcAvgFc(room){
  const vals=[room.fc1,room.fc2,room.fc3,room.fc4,room.fc5].filter(v=>v!==''&&v!==null&&v!==undefined&&!isNaN(parseFloat(v)));
  if(!vals.length) return '';
  return (vals.reduce((a,b)=>a+parseFloat(b),0)/vals.length).toFixed(1);
}

    ceilingType:d.ceilingType||'',
    fc1:d.fc1||'',fc2:d.fc2||'',fc3:d.fc3||'',fc4:d.fc4||'',fc5:d.fc5||'',avgFc:'',
    existingSensor:d.existingSensor||'',
    newSensor:d.newSensor||'',
    newSensorQty:d.newSensorQty||'',
    controlNotes:d.controlNotes||'',
    voltage:d.voltage||'',
    switching:d.switching||'',
    switchQty:d.switchQty||'',
    interiorExterior:d.interiorExterior||area.interiorExterior||'Interior',
    fixtures:[],
    photos:[],
    collapsed:false
  };
  room.avgFc=calcAvgFc(room);
  area.rooms.push(room);
  closeAddRoom();
  renderAreas();
}
function deleteRoom(areaId,roomId){
  if(!confirm('Delete this room and all its fixtures?')) return;
  const area=audit.areas.find(a=>a.id===areaId);
  if(area) area.rooms=area.rooms.filter(r=>r.id!==roomId);
  renderAreas();
}
function incrementRoomName(name){
  // If ends in a number, increment it. e.g. "Office 3" → "Office 4", "Room10" → "Room11"
  const match=name.match(/^(.*?)(\d+)(\s*)$/);
  if(match) return match[1]+String(parseInt(match[2])+1)+match[3];
  // No trailing number — append 2
  return name+' 2';
}
function copyRoom(areaId,roomId){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const src=area.rooms.find(r=>r.id===roomId);
  if(!src) return;
  // Deep clone the room, assign new id, new name, fresh photos, new fixture ids
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=uid();
  copy.name=incrementRoomName(src.name);
  copy.photos=[];// photos are room-specific, don't copy
  copy.collapsed=false;
  // Re-assign fixture IDs so they remain globally unique
  copy.fixtures=copy.fixtures.map(fx=>({...fx, id:fixtureIdCounter++}));
  // Collapse all other rooms in area, new copy opens expanded
  area.rooms.forEach(r=>{ r.collapsed=true; });
  copy.collapsed=false;
  // Insert immediately after the source room
  const idx=area.rooms.findIndex(r=>r.id===roomId);
  area.rooms.splice(idx+1,0,copy);
  renderAreas();
  // Scroll to new room
  setTimeout(()=>{
    const el=document.getElementById('room_'+copy.id);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}
function toggleRoomCollapse(areaId,roomId){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return;
  const expanding=room.collapsed;
  // If expanding, collapse all other rooms in this area first
  if(expanding) area.rooms.forEach(r=>{ if(r.id!==roomId) r.collapsed=true; });
  room.collapsed=!room.collapsed;
  renderAreas();
}

function addFixture(areaId,roomId){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return;
  const d=area.defaults;
  const fixture={
    id:fixtureIdCounter++,
    fixtureCode:'',
    fixtureEnergy:'',
    fixtureAttributes:'',
    fixtureHeight:d.fixtureHeight||'',
    qty:1,
    proposedAction:d.proposedAction||'Retrofit',
    burnHourGroup:d.burnHourGroup||'',
    difficultyFactor:d.difficultyFactor||'Base',
    lightingUse:'Area Lighting',
    specialEquipment:d.specialEquipment||'',
    notes:d.notes||'',
    lampsPerFixture:d.lampsPerFixture||'',
    lampTech:'',
    lampCode:'',
    editOpen:true
  };
  room.fixtures.push(fixture);
  renderAreas();
}
function deleteFixture(areaId,roomId,fixId){
  if(!confirm('Delete this fixture?')) return;
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(room) room.fixtures=room.fixtures.filter(f=>f.id!==fixId);
  renderAreas();
}
function toggleFixtureEdit(areaId,roomId,fixId){
  const fixture=getFixture(areaId,roomId,fixId);
  if(fixture) fixture.editOpen=!fixture.editOpen;
  renderAreas();
}
function getFixture(areaId,roomId,fixId){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return null;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return null;
  return room.fixtures.find(f=>f.id===fixId);
}
function updateFixtureField(areaId,roomId,fixId,field,value){
  const f=getFixture(areaId,roomId,fixId);
  if(f){f[field]=value;scheduleSave();}
}
function updateRoomField(areaId,roomId,field,value){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return;
  room[field]=value;
  scheduleSave();
  if(['fc1','fc2','fc3','fc4','fc5'].includes(field)){
    room.avgFc=calcAvgFc(room);
    const el=$id('avgFc_'+roomId);
    if(el) el.textContent='Avg FC: '+(room.avgFc||'—');
  }
  if(field==='length'||field==='width'){
    const l=parseFloat(room.length)||0;
    const w=parseFloat(room.width)||0;
    room.sqft=l&&w?Math.round(l*w):'';
    const el=$id('sqft_'+roomId);
    if(el) el.textContent=room.sqft||'';
  }
}

//  RENDER ENGINE
// =============================================
const TECH_NAMES={LED:'LED',LLED:'Linear LED',F:'Fluorescent',ES:'Exit Sign',MH:'Metal Halide',HPS:'High Pressure Sodium',MV:'Mercury Vapor',CFL:'Compact Fluorescent',QL:'QL Induction',HAL:'Halogen',Q:'Quartz',CIRC:'Circline Fluorescent',INCAN:'Incandescent',UFL:'U-Tube Fluorescent',CF:'Ceiling Fan',NE:'No Existing',TBD:'TBD'};

function simplifyFixture(fx){
  if(!fx.lampTech && !fx.fixtureCode) return '—';
  if(fx.lampTech==='NE') return 'No Existing';
  const tech=TECH_NAMES[fx.lampTech]||fx.lampTech||'Unknown';
  if(!fx.fixtureType) return tech;
  const addl=fx.fixtureTypeAddl && fx.fixtureTypeAddl!=='No Existing' && fx.fixtureTypeAddl!=='Lamp' && fx.fixtureTypeAddl!=='Fixture'
    ? fx.fixtureTypeAddl+' '
    : '';
  return `${tech} · ${addl}${fx.fixtureType}`;
}

function renderSummaryGrid(){
  const tbody=$id('summaryTableBody');
  if(!tbody) return;
  const rows=[];
  audit.areas.forEach(area=>{
    area.rooms.forEach(room=>{
      room.fixtures.forEach(fx=>{
        rows.push({area:area.name,room:room.name,fx});
      });
    });
  });
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="7" class="summary-empty">No fixtures entered yet.</td></tr>';
    return;
  }
  tbody.innerHTML=rows.map(r=>`
    <tr>
      <td class="summary-id">#${r.fx.id}</td>
      <td class="summary-area">${escHtml(r.area)}</td>
      <td class="summary-room">${escHtml(r.room||'—')}</td>
      <td class="summary-fixture">${escHtml(simplifyFixture(r.fx))}</td>
      <td class="summary-qty">${r.fx.qty||1}</td>
      <td class="summary-action">${escHtml(r.fx.proposedAction||'—')}</td>
      <td class="summary-notes" title="${escHtml(r.fx.notes||'')}">${escHtml(r.fx.notes||'')}</td>
    </tr>`).join('');
}

  const btn=event.target;

// _wizardState: {tech, lampCode, lpf, fixtureType, fixtureTypeAddl, lens, mounting, colorTemp, emergency, step, customLamp, targetAreaId, targetRoomId, targetFixId, context}
function openWizard(areaId,roomId,fixId,context){
  const existingFx = fixId ? getFixture(areaId,roomId,fixId) : null;
  const isEditing = !!(existingFx && existingFx.fixtureCode);
  _wizardState={
    tech:'',lampCode:'',lpf:'',fixtureType:'',fixtureTypeAddl:'',lens:'',mounting:'',colorTemp:'',emergency:'',
    step:0,customLamp:'',
    targetAreaId:areaId,targetRoomId:roomId,targetFixId:fixId,
    context:context||'fixture',
    isEditing:isEditing
  };
  $id('wizardModal').classList.add('active');
  renderWizardStep();
}
function closeWizard(){$id('wizardModal').classList.remove('active');}

function wizardBack(){
  if(_wizardState.step<=0) return;
  _wizardState.step--;
  // if step is skipped, keep going back
  const tech=_wizardState.tech;
  const skipped=getSkippedSteps(tech);
  while(_wizardState.step>0 && skipped.has(_wizardState.step)){
    _wizardState.step--;
  }
  // Clear the value for this step
  const fieldForStep=['','lampCode','lpf','fixtureType','fixtureTypeAddl','lens','mounting','colorTemp','emergency'];
  if(_wizardState.step>0 && fieldForStep[_wizardState.step]){
    _wizardState[fieldForStep[_wizardState.step]]='';
  }
  renderWizardStep();
}

function wizardJumpTo(step){
  // Allow jumping to any step — keep all existing values intact
  if(step<0||step>8) return;
  _wizardState.step=step;
  renderWizardStep();
}
function wizardSkip(){
  wizardAdvance();
}

function wizardCustomRow(applyFn, currentVal, existingOptions){
  // Only show "custom is active" indicator if the current value isn't in the standard list
  const isCustomActive = currentVal && !existingOptions.map(String).includes(String(currentVal));
  return `<div class="wizard-custom-row">
    <button class="wizard-custom-toggle btn btn-outline btn-sm" onclick="wizardToggleCustom(this)">+ Custom</button>
    <div class="wizard-custom-entry" style="display:none">
      <input class="form-control" placeholder="Type custom value..." id="wizardCustomInput"
        onkeydown="if(event.key==='Enter'){event.preventDefault();wizardApplyCustom('${applyFn}')}"
        ${isCustomActive?`value="${escHtml(currentVal)}"`:''}>
      <button class="btn btn-primary btn-sm" onclick="wizardApplyCustom('${applyFn}')">Use It</button>
    </div>
    ${isCustomActive?`<span class="wizard-custom-badge">Custom: ${escHtml(currentVal)}</span>`:''}
  </div>`;
}
function wizardToggleCustom(btn){
  const row=btn.closest('.wizard-custom-row');
  const entry=row.querySelector('.wizard-custom-entry');
  const visible=entry.style.display!=='none';
  entry.style.display=visible?'none':'flex';
  btn.textContent=visible?'+ Custom':'✕ Cancel';
  if(!visible) setTimeout(()=>row.querySelector('input')?.focus(),50);
}
function wizardApplyCustom(applyFn){
  const inp=document.getElementById('wizardCustomInput');
  if(!inp) return;
  const val=inp.value.trim();
  if(!val){inp.focus();return;}
  window[applyFn](val);
}

function renderWizardStep(){
  const s=_wizardState;
  const crumbData=[
    {label:'Tech',value:s.tech?TECH_OPTIONS.find(t=>t.code===s.tech)?.label||s.tech:''},
    {label:'Lamp',value:s.lampCode},
    {label:'L/F',value:s.lpf},
    {label:'Type',value:s.fixtureType},
    {label:'Type Addl',value:s.fixtureTypeAddl},
    {label:'Lens',value:s.lens},
    {label:'Mount',value:s.mounting},
    {label:'Temp',value:s.colorTemp},
    {label:'Emerg',value:s.emergency}
  ];

  // Breadcrumb
  const bc=crumbData.map((c,i)=>{
    const isActive=i===s.step;
    const hasValue=!!c.value;
    const isPast=i<s.step;
    let cls='wizard-crumb';
    if(isActive) cls+=' active';
    else if(isPast||hasValue) cls+=' done';
    // After tech is chosen, all crumbs except active are clickable
    const jumpable=!isActive&&s.tech;
    const clickable=jumpable?`onclick="wizardJumpTo(${i})" title="Go to ${c.label}"`:' ';
    return `<div class="${cls}" ${clickable}>
      <span class="wizard-crumb-label">${c.label}</span>
      <span class="wizard-crumb-value">${c.value||'—'}</span>
    </div>`;
  }).join('');
  $id('wizardBreadcrumb').innerHTML=bc;

  // Back button
  $id('wizardBackBtn').style.display=s.step>0?'':'none';

  // Code preview
  $id('wizardCodePreview').textContent=buildWizardCode(s);

  // Content
  let html='';
  if(s.step===0){
    html=`<div class="wizard-step-title">Step 1 — Select Lamp Technology</div>
    <div class="tech-tiles">
      ${TECH_OPTIONS.map(t=>`<button class="tech-tile${s.tech===t.code?' selected':''}" onclick="wizardSelectTech('${t.code}')">${TECH_ICONS[t.code]||''}<span>${escHtml(t.label)}</span></button>`).join('')}
    </div>`;
  } else if(s.step===1){
    const codes=LAMP_CODES[s.tech]||[];
    html=`<div class="wizard-step-title">Step 2 — Lamp Code</div>
    <div class="wizard-options">
      ${codes.map(c=>`<button class="wizard-option${s.lampCode===c?' selected':''}" onclick="wizardSelectLampCode('${c.replace(/'/g,"\\'")}')">${escHtml(c)}</button>`).join('')}
    </div>
    ${wizardCustomRow('wizardSelectLampCode',s.lampCode,codes)}`;
  } else if(s.step===2){
    const opts=LPF_OPTIONS[s.tech]||[1];
    html=`<div class="wizard-step-title">Step 3 — Lamps per Fixture</div>
    <div class="wizard-options">
      ${opts.map(v=>`<button class="wizard-option${String(s.lpf)===String(v)?' selected':''}" onclick="wizardSelectLPF('${v}')">${v}</button>`).join('')}
    </div>
    ${wizardCustomRow('wizardSelectLPF',s.lpf,opts.map(String))}`;
  } else if(s.step===3){
    const types=FIXTURE_TYPES[s.tech]||[];
    html=`<div class="wizard-step-title">Step 4 — Fixture Type</div>
    <div class="wizard-options">
      ${types.map(t=>`<button class="wizard-option${s.fixtureType===t?' selected':''}" onclick="wizardSelectFixtureType('${t.replace(/'/g,"\\'")}')">${escHtml(t)}</button>`).join('')}
    </div>
    ${wizardCustomRow('wizardSelectFixtureType',s.fixtureType,types)}`;
  } else if(s.step===4){
    const addls=FIXTURE_TYPE_ADDL[s.tech]||[];
    html=`<div class="wizard-step-title">Step 5 — Fixture Type Addl</div>
    <div class="wizard-options">
      ${addls.map(t=>`<button class="wizard-option${s.fixtureTypeAddl===t?' selected':''}" onclick="wizardSelectFixtureTypeAddl('${t.replace(/'/g,"\\'")}')">${escHtml(t)}</button>`).join('')}
    </div>
    ${wizardCustomRow('wizardSelectFixtureTypeAddl',s.fixtureTypeAddl,addls)}`;
  } else if(s.step===5){
    const lenses=LENS_TYPES[s.tech]||[];
    html=`<div class="wizard-step-title">Step 6 — Lens Type</div>
    <div class="wizard-options">
      ${lenses.map(l=>`<button class="wizard-option${s.lens===l?' selected':''}" onclick="wizardSelectLens('${l.replace(/'/g,"\\'")}')">${escHtml(l)}</button>`).join('')}
    </div>
    ${wizardCustomRow('wizardSelectLens',s.lens,lenses)}`;
  } else if(s.step===6){
    const mounts=MOUNTING_TYPES[s.tech]||[];
    html=`<div class="wizard-step-title">Step 7 — Mounting</div>
    <div class="wizard-options">
      ${mounts.map(m=>`<button class="wizard-option${s.mounting===m?' selected':''}" onclick="wizardSelectMounting('${m.replace(/'/g,"\\'")}')">${escHtml(m)}</button>`).join('')}
    </div>
    ${wizardCustomRow('wizardSelectMounting',s.mounting,mounts)}`;
  } else if(s.step===7){
    const temps=getColorTemps(s.tech);
    html=`<div class="wizard-step-title">Step 8 — Color Temperature</div>
    <div class="wizard-options">
      ${(temps||[]).map(t=>`<button class="wizard-option${s.colorTemp===t?' selected':''}" onclick="wizardSelectColorTemp('${t}')">${t}K</button>`).join('')}
    </div>

  } else if(s.step===8){
    html=`<div class="wizard-step-title">Step 9 — Emergency</div>
    <div class="wizard-options">
      <button class="wizard-option${s.emergency==='Yes'?' selected':''}" onclick="wizardSelectEmergency('Yes')">Yes</button>
      <button class="wizard-option${s.emergency==='No'?' selected':''}" onclick="wizardSelectEmergency('No')">No</button>
    </div>
    ${wizardCustomRow('wizardSelectEmergency',s.emergency,['Yes','No'])}`;
  }
  $id('wizardContent').innerHTML=html;

function buildWizardCode(s){
  if(!s.tech) return '-';
  if(s.tech==='NE') return 'NE-No Existing-0/No Existing-No Existing-No Existing-No Existing-No Existing-No Existing';
  const techLabel=TECH_OPTIONS.find(t=>t.code===s.tech)?.label||s.tech;
  const energy=`${s.tech}-${s.lampCode||'?'}-${s.lpf||'?'}`;
  const lens=LENS_TYPES[s.tech]===null?'*':s.lens||'?';
  const temp=s.tech==='CF'?'*':(s.tech==='TBD'?'TBD':(s.colorTemp||'?'));
  const emerg=s.tech==='CF'?'*':(s.tech==='TBD'?'TBD':(s.emergency||'?'));
  const attrs=`${s.fixtureType||'?'}-${s.fixtureTypeAddl||'?'}-${lens}-${s.mounting||'?'}-${temp}-${emerg}`;
  return `${energy} / ${attrs}`;
}

function wizardSelectTech(code){
  _wizardState.tech=code;
  // No Existing: auto-complete immediately
  if(code==='NE'){
    _wizardState.lampCode='No Existing';
    _wizardState.lpf='0';
    _wizardState.fixtureType='No Existing';
    _wizardState.fixtureTypeAddl='No Existing';
    _wizardState.lens='No Existing';
    _wizardState.mounting='No Existing';
    _wizardState.colorTemp='No Existing';
    _wizardState.emergency='No Existing';
    applyWizardResult();
    return;
  }
  _wizardState.step=1;
  renderWizardStep();
}

function wizardSelectLampCode(code){
  _wizardState.lampCode=code;
  wizardAdvance();
}
function wizardSelectCustomLamp(){
  const v=$id('customLampInput')?.value?.trim();
  if(!v){alert('Please enter a custom lamp code.');return;}
  _wizardState.lampCode=v;
  _wizardState.customLamp=v;
  wizardAdvance();
}
function wizardSelectLPF(val){
  _wizardState.lpf=val;
  wizardAdvance();
}
function wizardSelectFixtureType(val){
  _wizardState.fixtureType=val;
  // UFL auto-selects 2X2 for type addl (already handled by only one option)
  wizardAdvance();
}
function wizardSelectFixtureTypeAddl(val){
  _wizardState.fixtureTypeAddl=val;
  wizardAdvance();
}
function wizardSelectLens(val){
  _wizardState.lens=val;
  wizardAdvance();
}
function wizardSelectMounting(val){
  _wizardState.mounting=val;
  wizardAdvance();
}
function wizardSelectColorTemp(val){
  _wizardState.colorTemp=val;
  wizardAdvance();
}
function wizardSelectEmergency(val){
  _wizardState.emergency=val;
  // Last step — apply
  applyWizardResult();
}

function wizardAdvance(){
  const s=_wizardState;
  const tech=s.tech;
  const skipped=getSkippedSteps(tech);

  // Special auto-select for UFL step 3 (type=2X2, step index 3)
  if(s.step===2 && tech==='UFL'){
    s.fixtureType='2X2';
  }

  // TBD auto-fills temp+emerg
  // CF skips lens(5), temp(7), emerg(8)

  let next=s.step+1;
  // Skip steps as needed
  while(next<=8 && skipped.has(next)){
    // auto-fill skipped step values
    if(next===5) s.lens='*'; // CF lens
    if(next===7) { // temp
      if(tech==='CF') s.colorTemp='*';
      else if(tech==='TBD') s.colorTemp='TBD';
    }
    if(next===8) { // emerg
      if(tech==='CF') s.emergency='*';
      else if(tech==='TBD') s.emergency='TBD';
    }
    next++;
  }

  if(next>8){
    if(!_wizardState.isEditing){
      applyWizardResult();
    } else {
      s.step=8;
      renderWizardStep();
    }
    return;
  }
  s.step=next;
  renderWizardStep();
}

function applyWizardResult(){
  const s=_wizardState;
  const energy=s.tech==='NE'
    ?'NE-No Existing-0'
    :`${s.tech}-${s.lampCode}-${s.lpf}`;
  const lens=LENS_TYPES[s.tech]===null?'*':s.lens;
  const temp=s.tech==='CF'?'*':(s.tech==='TBD'?'TBD':s.colorTemp);
  const emerg=s.tech==='CF'?'*':(s.tech==='TBD'?'TBD':(s.tech==='NE'?'No Existing':s.emergency));

  const attrs=s.tech==='NE'
    ?'No Existing-No Existing-No Existing-No Existing-No Existing-No Existing'
    :`${s.fixtureType}-${s.fixtureTypeAddl}-${lens}-${s.mounting}-${temp}-${emerg}`;

  const code=`${energy} / ${attrs}`;

  if(s.context==='massUpdate'){
    _massUpdateContext.wizardResult={energy,attrs,code,lampCode:s.lampCode,lampTech:s.tech};
    $id('muFixtureCodeDisplay').textContent=code;
    closeWizard();
    return;
  }

  const fx=getFixture(s.targetAreaId,s.targetRoomId,s.targetFixId);
  if(fx){
    fx.fixtureCode=code;
    fx.fixtureEnergy=energy;
    fx.fixtureAttributes=attrs;
    fx.lampCode=s.lampCode;
    fx.lampTech=s.tech;
    fx.lampsPerFixture=s.lpf;
    fx.fixtureType=s.fixtureType||'';
    fx.fixtureTypeAddl=s.fixtureTypeAddl||'';
  }
  closeWizard();
  renderAreas();
}

function muToggleArea(areaId,checked){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  area.rooms.forEach(room=>{
    const el=$id('muRoom_'+room.id);
    if(el) el.checked=checked;
    room.fixtures.forEach(fx=>{
      const el2=$id('muFix_'+fx.id);
      if(el2) el2.checked=checked;
    });
  });
}
function muToggleRoom(areaId,roomId,checked){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return;
  room.fixtures.forEach(fx=>{
    const el=$id('muFix_'+fx.id);
    if(el) el.checked=checked;
  });
}
function muSelectAll(checked){
  document.querySelectorAll('[id^="muFix_"]').forEach(el=>el.checked=checked);
  document.querySelectorAll('[id^="muRoom_"]').forEach(el=>el.checked=checked);
  document.querySelectorAll('[id^="muArea_"]').forEach(el=>el.checked=checked);
}
function openMassUpdateWizard(){
  openWizard(null,null,null,'massUpdate');
}
function applyMassUpdate(){
  const chkBurn=$id('muChkBurn')?.checked;
  const burnVal=$id('muBurnVal')?.value;
  const chkAction=$id('muChkAction')?.checked;
  const actionVal=$id('muActionVal')?.value;
  const chkFixture=$id('muChkFixture')?.checked;
  const fixtureResult=_massUpdateContext.wizardResult;

  const selected=[];
  document.querySelectorAll('[id^="muFix_"]').forEach(el=>{
    if(el.checked){
      selected.push({areaId:el.dataset.area,roomId:el.dataset.room,fixId:parseInt(el.dataset.fix)});
    }
  });

  if(!selected.length){alert('No fixtures selected.');return;}

  selected.forEach(({areaId,roomId,fixId})=>{
    const fx=getFixture(areaId,roomId,fixId);
    if(!fx) return;
    if(chkBurn&&burnVal) fx.burnHourGroup=burnVal;
    if(chkAction&&actionVal) fx.proposedAction=actionVal;
    if(chkFixture&&fixtureResult){
      fx.fixtureCode=fixtureResult.code;
      fx.fixtureEnergy=fixtureResult.energy;
      fx.fixtureAttributes=fixtureResult.attrs;
      fx.lampCode=fixtureResult.lampCode;
      fx.lampTech=fixtureResult.lampTech;
    }
  });

  closeMassUpdate();
  renderAreas();
  alert(`Mass update applied to ${selected.length} fixture(s).`);
}

function renderPhotoThumbs(areaId, room){
  if(!room.photos||!room.photos.length) return '<div style="color:#aaa;font-size:.82rem;font-style:italic">No photos yet.</div>';
  return room.photos.map(p=>`
    <div class="photo-thumb">
      <img src="${p.dataUrl}" alt="${escHtml(p.name)}" onclick="openPhotoViewer('${p.dataUrl}','${escHtml(p.name)}')">
      <button class="photo-del" onclick="event.stopPropagation();deletePhoto('${areaId}','${room.id}','${p.id}')" title="Delete">&#10005;</button>
    </div>`).join('');
}

function addPhotos(areaId, roomId, input){
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return;
  if(!room.photos) room.photos=[];
  const files=Array.from(input.files);
  let processed=0;
  files.forEach(file=>{
    compressPhoto(file, dataUrl=>{
      room.photos.push({id:uid(), dataUrl, name:file.name, timestamp:new Date().toISOString()});
      processed++;
      if(processed===files.length){
        scheduleSave();
        const grid=$id('photoGrid_'+roomId);
        if(grid) grid.innerHTML=renderPhotoThumbs(areaId,room);
      }
    });
  });
  input.value='';
}

function compressPhoto(file, callback){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1200;
      const scale=Math.min(1, maxW/img.width);
      const w=Math.round(img.width*scale);
      const h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function deletePhoto(areaId, roomId, photoId){
  if(!confirm('Delete this photo?')) return;
  const area=audit.areas.find(a=>a.id===areaId);
  if(!area) return;
  const room=area.rooms.find(r=>r.id===roomId);
  if(!room) return;
  room.photos=(room.photos||[]).filter(p=>p.id!==photoId);
  scheduleSave();
  const grid=$id('photoGrid_'+roomId);
  if(grid) grid.innerHTML=renderPhotoThumbs(areaId,room);
}

function exportPDF(){

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=210, pageH=297, margin=14, contentW=pageW-margin*2;
  let y=margin;

  // --- helper: check page break ---
  function checkBreak(needed){
    if(y+needed>pageH-margin){doc.addPage();y=margin;drawPageHeader();}
  }
  function drawPageHeader(){
    doc.setFillColor(13,43,85);
    doc.rect(0,0,pageW,12,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(9);
    doc.setFont(undefined,'bold');
    doc.text('EPOS AUDIT',margin,8);
    doc.setFont(undefined,'normal');
    doc.text(locName,pageW/2,8,{align:'center'});
    doc.text(new Date().toLocaleDateString(),pageW-margin,8,{align:'right'});
    doc.setTextColor(0,0,0);
  }

  // --- Cover page ---
  doc.setFillColor(13,43,85);
  doc.rect(0,0,pageW,50,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);
  doc.setFont(undefined,'bold');
  doc.text('EPOS AUDIT',pageW/2,28,{align:'center'});
  doc.setFontSize(13);
  doc.setFont(undefined,'normal');
  doc.text('Lighting Field Report',pageW/2,38,{align:'center'});
  doc.setTextColor(0,0,0);
  y=60;
  // Facility info block
  doc.setFontSize(11);
  doc.setFont(undefined,'bold');
  doc.text('Facility Information',margin,y); y+=7;
  doc.setFont(undefined,'normal');
  doc.setFontSize(10);
  const l=audit.location;
  const infoLines=[
    ['Location',l.name],['Address',([l.address1,l.address2,l.city,l.state,l.zip].filter(Boolean).join(', '))],
    ['Facility Type',l.facilityType],['Utility',l.utilityCompany],
    ['$/kWh',l.kwhCost],['Building SqFt',l.buildingSqFt],['Avg Monthly kWh',l.avgMonthlyKwh],
  ];
  infoLines.forEach(([k,v])=>{
    if(!v) return;
    doc.setFont(undefined,'bold'); doc.text(k+':',margin,y);
    doc.setFont(undefined,'normal'); doc.text(String(v),margin+38,y);
    y+=6;
  });
  if(l.facilityNotes){
    y+=3;
    doc.setFont(undefined,'bold'); doc.text('Notes:',margin,y); y+=6;
    doc.setFont(undefined,'normal');
    const noteLines=doc.splitTextToSize(l.facilityNotes,contentW);
    doc.text(noteLines,margin,y); y+=noteLines.length*5+4;
  }

  // --- Area/Room pages ---
  audit.areas.forEach(area=>{
    doc.addPage(); y=margin;
    drawPageHeader();
    y=18;

    // Area header bar
    doc.setFillColor(26,111,186);
    doc.rect(margin,y,contentW,9,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(11);
    doc.setFont(undefined,'bold');
    doc.text('AREA: '+area.name.toUpperCase()+(area.interiorExterior?' ('+area.interiorExterior+')':''),margin+3,y+6.5);
    doc.setTextColor(0,0,0);
    y+=14;

    area.rooms.forEach(room=>{
      checkBreak(30);

      // Room title
      doc.setFillColor(232,240,251);
      doc.rect(margin,y,contentW,8,'F');
      doc.setFontSize(10);
      doc.setFont(undefined,'bold');
      doc.setTextColor(13,43,85);
      const roomMeta=[room.roomType,room.sqft?room.sqft+' sqft':''].filter(Boolean).join(' · ');
      doc.text(room.name+(roomMeta?' — '+roomMeta:''),margin+2,y+5.5);
      doc.setTextColor(0,0,0);
      y+=11;

      // Fixtures table
      if(room.fixtures&&room.fixtures.length){
        doc.setFontSize(8);
        doc.setFont(undefined,'bold');
        const cols=[['ID#',10],['Fixture',72],['Qty',12],['Action',38],['Notes',48]];
        let cx=margin;
        // header row
        doc.setFillColor(220,230,245);
        doc.rect(margin,y,contentW,6,'F');
        cols.forEach(([label,w])=>{doc.text(label,cx+1,y+4.5);cx+=w;});
        y+=7;
        doc.setFont(undefined,'normal');
        room.fixtures.forEach((fx,i)=>{
          checkBreak(7);
          if(i%2===0){doc.setFillColor(248,250,255);doc.rect(margin,y,contentW,6,'F');}
          cx=margin;
          const simplified=simplifyFixture(fx);
          const cells=[String(fx.id||''),simplified,String(fx.qty||1),fx.proposedAction||'',fx.notes||''];
          cells.forEach((val,ci)=>{
            const maxW=cols[ci][1]-2;
            const txt=doc.splitTextToSize(val,maxW)[0]||'';
            doc.text(txt,cx+1,y+4.5);
            cx+=cols[ci][1];
          });
          y+=6;
        });
        y+=4;
      } else {
        doc.setFontSize(8);doc.setFont(undefined,'italic');doc.setTextColor(170,170,170);
        doc.text('No fixtures entered.',margin+2,y+4);
        doc.setTextColor(0,0,0);
        y+=8;
      }

      // Room notes
      if(room.roomNotes){
        checkBreak(10);
        doc.setFontSize(8);doc.setFont(undefined,'italic');doc.setTextColor(100,100,100);
        const nl=doc.splitTextToSize('Notes: '+room.roomNotes,contentW);
        doc.text(nl,margin,y);
        y+=nl.length*4+3;
        doc.setTextColor(0,0,0);
      }

      // Photos
      if(room.photos&&room.photos.length){
        checkBreak(60);
        doc.setFontSize(8);doc.setFont(undefined,'bold');doc.setTextColor(13,43,85);
        doc.text('Photos ('+room.photos.length+')',margin,y+4); y+=7;
        doc.setTextColor(0,0,0);
        const photoW=58, photoH=44, photoCols=3, photoGap=3;
        let px=margin, photoRow=0;
        room.photos.forEach((p,pi)=>{
          if(pi>0&&pi%photoCols===0){y+=photoH+photoGap+2;px=margin;checkBreak(photoH+10);}
          try{
            // strip data URL prefix to get base64
            const b64=p.dataUrl.split(',')[1];
            doc.addImage(b64,'JPEG',px,y,photoW,photoH,undefined,'FAST');
          }catch(e){}
          px+=photoW+photoGap;
        });
        y+=photoH+6;
      }
      y+=6;
    });
  });

  // Save
  const date=new Date().toISOString().slice(0,10);
  doc.save(`${locName.replace(/[^a-z0-9]/gi,'_')}_Audit_Report_${date}.pdf`);
}

// =============================================

// =============================================
const PROJ_KEY='epos_projects_v3';
const ACTIVE_KEY='epos_active_v3';
let currentProjectId=null;
let _saveTimer=null;

function getAllProjects(){
  try{return JSON.parse(localStorage.getItem(PROJ_KEY))||[];}catch(e){return[];}
}
function setAllProjects(list){
  try{localStorage.setItem(PROJ_KEY,JSON.stringify(list));}catch(e){}
}

function saveState(){
  try{
    const projects=getAllProjects();
    const idx=projects.findIndex(p=>p.id===currentProjectId);
    const entry={
      id:currentProjectId,
      audit:JSON.parse(JSON.stringify(audit)),// deep clone
      fixtureIdCounter,
      lastModified:new Date().toISOString()
    };
    if(idx>=0) projects[idx]=entry; else projects.push(entry);
    setAllProjects(projects);
    localStorage.setItem(ACTIVE_KEY,currentProjectId);
    const dot=$id('saveDot');
    if(dot){dot.classList.remove('unsaved');dot.title='Saved';}
  }catch(e){}
}

function scheduleSave(){
  const dot=$id('saveDot');
  if(dot) dot.classList.add('unsaved');
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(saveState,800);
}

function restoreFacilityFields(){
  const l=audit.location;
  const map={loc_name:'name',loc_addr1:'address1',loc_addr2:'address2',loc_city:'city',loc_state:'state',loc_zip:'zip',loc_country:'country',loc_facType:'facilityType',loc_utility:'utilityCompany',loc_kwh:'kwhCost',loc_demand:'kwhDemandCost',loc_sqft:'buildingSqFt',loc_payment:'avgMonthlyPayment',loc_mkwh:'avgMonthlyKwh',loc_notes:'facilityNotes'};
  Object.entries(map).forEach(([id,key])=>{const el=$id(id);if(el&&l[key]!=null) el.value=l[key];});
}

function updateProjectHeader(){
  const label=$id('currentProjLabel');
  if(label) label.textContent=audit.location.name||'Unnamed Audit';
}

function loadProject(id){
  const projects=getAllProjects();
  const p=projects.find(p=>p.id===id);
  if(!p) return false;
  audit.location=Object.assign({name:'',address1:'',address2:'',city:'',state:'',zip:'',country:'USA',facilityType:'',utilityCompany:'',kwhCost:'',kwhDemandCost:'',buildingSqFt:'',avgMonthlyPayment:'',avgMonthlyKwh:'',facilityNotes:''},p.audit.location||{});
  audit.areas=p.audit.areas||[];
  fixtureIdCounter=p.fixtureIdCounter||1;
  currentProjectId=id;
  localStorage.setItem(ACTIVE_KEY,id);
  restoreFacilityFields();
  renderAreas();
  updateProjectHeader();
  return true;
}

function createNewProject(){
  saveState();// save current first
  // reset to blank
  audit.location={name:'',address1:'',address2:'',city:'',state:'',zip:'',country:'USA',facilityType:'',utilityCompany:'',kwhCost:'',kwhDemandCost:'',buildingSqFt:'',avgMonthlyPayment:'',avgMonthlyKwh:'',facilityNotes:''};
  audit.areas=[];
  fixtureIdCounter=1;
  currentProjectId=uid();
  saveState();
  restoreFacilityFields();
  renderAreas();
  updateProjectHeader();
  closeProjectManager();
}

function deleteProject(id){
  if(!confirm('Permanently delete this project?')) return;
  const projects=getAllProjects().filter(p=>p.id!==id);
  setAllProjects(projects);
  if(id===currentProjectId){
    if(projects.length>0){
      loadProject(projects[projects.length-1].id);
    } else {
      createNewProject();
      return;
    }
  }
  renderProjectList();
}

function exportProjectJSON(){

  if(!p){alert('No active project to export.');return;}
  const name=(p.audit?.location?.name||'audit').replace(/[^a-z0-9]/gi,'_');

  const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});

function importProjectJSON(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      // Validate basic structure
      if(!p.audit||!p.audit.areas) throw new Error('Invalid audit file.');
      // Assign a fresh ID so it doesn't overwrite an existing project
      p.id=uid();
      p.lastModified=new Date().toISOString();
      const locName=p.audit?.location?.name||'Imported Audit';
      const projects=getAllProjects();
      projects.push(p);
      setAllProjects(projects);
      // Switch to the imported project
      saveState();
      loadProject(p.id);
      closeProjectManager();
      alert(`"${locName}" imported successfully.`);
    }catch(err){
      alert('Could not import file: '+err.message);
    }
  };
  reader.readAsText(file);
  input.value='';
}

function renderProjectList(){
  const projects=getAllProjects();
  const el=$id('projList');
  if(!el) return;
  if(!projects.length){
    el.innerHTML='<div style="text-align:center;color:#aaa;padding:20px;font-style:italic">No saved projects.</div>';
    return;
  }
  // sort newest first
  const sorted=[...projects].sort((a,b)=>new Date(b.lastModified)-new Date(a.lastModified));
  el.innerHTML=sorted.map(p=>{
    const name=p.audit?.location?.name||'Unnamed Audit';
    const city=p.audit?.location?.city||'';
    const state=p.audit?.location?.state||'';
    const loc=[city,state].filter(Boolean).join(', ');
    const fixtureCount=countFixtures(p.audit);
    const date=p.lastModified?new Date(p.lastModified).toLocaleDateString():'';
    const isActive=p.id===currentProjectId;
    return `<div class="proj-item${isActive?' active-proj':''}" onclick="switchToProject('${p.id}')">
      <div class="proj-info">
        <div class="proj-name">${escHtml(name)}</div>
        <div class="proj-meta">${escHtml(loc)||'No address'} &bull; ${fixtureCount} fixture(s) &bull; ${date}</div>
      </div>
      ${isActive?'<span class="proj-badge">Current</span>':''}
      <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteProject('${p.id}')">Delete</button>
    </div>`;
  }).join('');
}

function countFixtures(auditObj){
  if(!auditObj?.areas) return 0;
  return auditObj.areas.reduce((t,a)=>t+a.rooms.reduce((t2,r)=>t2+(r.fixtures?.length||0),0),0);
}

function switchToProject(id){
  if(id===currentProjectId){closeProjectManager();return;}
  saveState();
  loadProject(id);
  closeProjectManager();
}

// Auto-save every 10 seconds
setInterval(saveState,10000);

// Update project label when location name changes
const _origLocNameInput=$id('loc_name');
if(_origLocNameInput){
  _origLocNameInput.addEventListener('input',()=>updateProjectHeader());
}

// =============================================
//  INIT
// =============================================
(function(){
  const activeId=localStorage.getItem(ACTIVE_KEY);
  const projects=getAllProjects();
  if(activeId && projects.find(p=>p.id===activeId)){
    loadProject(activeId);
  } else if(projects.length>0){
    // load most recently modified
    const latest=projects.sort((a,b)=>new Date(b.lastModified)-new Date(a.lastModified))[0];
    loadProject(latest.id);
  } else {
    // brand new — create first project
    currentProjectId=uid();
    audit.location.country='USA';
    restoreFacilityFields();
    renderAreas();
    saveState();
  }
  updateProjectHeader();
})();
</script>
</body>
